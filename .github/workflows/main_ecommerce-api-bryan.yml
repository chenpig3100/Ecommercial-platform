name: Build and deploy ASP.NET Core app to Azure Web App - ecommerce-api-bryan

on:
  push:
    branches:
      - main
    paths:
      - "backend/Ecommerce.Api/**"
      - ".github/workflows/main_ecommerce-api-bryan.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore dependencies
        run: dotnet restore backend/Ecommerce.Api/Ecommerce.Api.csproj

      - name: Build with dotnet
        run: dotnet build backend/Ecommerce.Api/Ecommerce.Api.csproj --configuration Release --no-restore

      - name: Dotnet publish
        run: dotnet publish backend/Ecommerce.Api/Ecommerce.Api.csproj -c Release -o ${{ env.DOTNET_ROOT }}/myapp --no-build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.DOTNET_ROOT }}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "ecommerce-api-bryan"
          slot-name: "Production"
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_990F4B37D2324F96ACAF75C24DBBC801 }}
